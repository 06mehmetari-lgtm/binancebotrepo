networks:
  prometheus_net:
    driver: bridge

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  qdrant_data:
  grafana_data:
  prometheus_data:
  ollama_data:

services:

  # ═══════════════════════════════════════
  # VERİTABANLARI
  # ═══════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: prometheus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prometheus_trading
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infrastructure/postgres/migrations:/migrations:ro
    ports:
      - "5432:5432"
    networks:
      - prometheus_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: prometheus_timescale
    restart: unless-stopped
    environment:
      POSTGRES_DB: prometheus_timeseries
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infrastructure/timescale/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - prometheus_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prometheus_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - prometheus_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: prometheus_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - prometheus_net

  # ═══════════════════════════════════════
  # UYGULAMA SERVİSLERİ
  # ═══════════════════════════════════════
  data_ingestion:
    build: ./services/data_ingestion
    container_name: prometheus_data
    restart: unless-stopped
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - TIMESCALE_URL=postgresql://${TIMESCALE_USER}:${TIMESCALE_PASSWORD}@timescaledb:5432/prometheus_timeseries
      - SYMBOLS=${TRADING_SYMBOLS}
      - TOP_SYMBOLS=${TOP_SYMBOLS:-500}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - prometheus_net

  sentiment:
    build: ./services/sentiment
    container_name: prometheus_sentiment
    restart: unless-stopped
    environment:
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - CRYPTOPANIC_KEY=${CRYPTOPANIC_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
    depends_on:
      - redis
      - postgres
    networks:
      - prometheus_net

  macro:
    build: ./services/macro
    container_name: prometheus_macro
    restart: unless-stopped
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
      - ETHERSCAN_KEY=${ETHERSCAN_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis
    networks:
      - prometheus_net

  feature_engine:
    build: ./services/feature_engine
    container_name: prometheus_features
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - TIMESCALE_URL=postgresql://${TIMESCALE_USER}:${TIMESCALE_PASSWORD}@timescaledb:5432/prometheus_timeseries
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - SYMBOLS=${TRADING_SYMBOLS}
      - TOP_SYMBOLS=${TOP_SYMBOLS:-500}
    depends_on:
      - redis
      - timescaledb
    networks:
      - prometheus_net

  context_engine:
    build: ./services/context_engine
    container_name: prometheus_context
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
    depends_on:
      - redis
      - postgres
    networks:
      - prometheus_net

  learning_engine:
    build:
      context: ./services
      dockerfile: learning_engine/Dockerfile
    container_name: prometheus_learning
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - LEARNING_SCAN_SEC=${LEARNING_SCAN_SEC:-2}
      - LEARNING_SCAN_BATCH=${LEARNING_SCAN_BATCH:-100}
      - LEARNING_CONCURRENCY=${LEARNING_CONCURRENCY:-80}
      - LEARNING_PROFILE_EVERY_N=${LEARNING_PROFILE_EVERY_N:-30}
      - LEARNING_LLM_EVERY_N=${LEARNING_LLM_EVERY_N:-90}
      - LEARNING_GLOBAL_SYNC_SEC=${LEARNING_GLOBAL_SYNC_SEC:-30}
      - LEARNING_FAST_TRACK=${LEARNING_FAST_TRACK:-true}
      - LEARNING_OPEN_POSITION_SEC=${LEARNING_OPEN_POSITION_SEC:-0.5}
      - GROQ_LEARN_MODEL=${GROQ_LEARN_MODEL:-llama-3.3-70b-versatile}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-240}
      - LLM_KEY_SLOTS=${LLM_KEY_SLOTS:-32}
      - LLM_PROVIDER_ORDER=${LLM_PROVIDER_ORDER:-ollama}
      - LLM_OLLAMA_ONLY=${LLM_OLLAMA_ONLY:-true}
      - LLM_CLOUD_BLOCKED=${LLM_CLOUD_BLOCKED:-true}
      - GROQ_LEARNING_MODELS=${GROQ_LEARNING_MODELS:-}
      - GROQ_FALLBACK_MODEL=${GROQ_FALLBACK_MODEL:-}
      - AI_ENABLE_SWARM=${AI_ENABLE_SWARM:-false}
      - LEARNING_CONCURRENCY=${LEARNING_CONCURRENCY:-4}
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
      feature_engine:
        condition: service_started
      context_engine:
        condition: service_started
    networks:
      - prometheus_net

  neat_evolution:
    build: ./services/neat_evolution
    container_name: prometheus_neat
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - TIMESCALE_URL=postgresql://${TIMESCALE_USER}:${TIMESCALE_PASSWORD}@timescaledb:5432/prometheus_timeseries
      - NEAT_MAX_SYMBOLS=${NEAT_MAX_SYMBOLS:-150}
      - NEAT_CONCURRENCY=${NEAT_CONCURRENCY:-4}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    depends_on:
      - postgres
      - redis
    networks:
      - prometheus_net

  rl_agent:
    build: ./services/rl_agent
    container_name: prometheus_rl
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    depends_on:
      - postgres
      - redis
    networks:
      - prometheus_net

  ollama:
    image: ollama/ollama:latest
    container_name: prometheus_ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 10G
    networks:
      - prometheus_net

  agent_system:
    build:
      context: ./services
      dockerfile: agent_system/Dockerfile
    container_name: prometheus_agents
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-240}
      - AGENT_BATCH_SIZE=${AGENT_BATCH_SIZE:-120}
      - AGENT_CONCURRENCY=${AGENT_CONCURRENCY:-8}
      - LLM_OLLAMA_ONLY=${LLM_OLLAMA_ONLY:-true}
      - LLM_CLOUD_BLOCKED=${LLM_CLOUD_BLOCKED:-true}
      - AGENT_CYCLE_SEC=${AGENT_CYCLE_SEC:-3}
      - POSITION_GUARD_SEC=${POSITION_GUARD_SEC:-1.0}
      - GUARD_MAX_LOSS_PCT=${GUARD_MAX_LOSS_PCT:-1.5}
      - GUARD_EMERGENCY_LOSS_PCT=${GUARD_EMERGENCY_LOSS_PCT:-2.5}
      - GUARD_DEBATE_MAX_AGE=${GUARD_DEBATE_MAX_AGE:-8}
      - GUARD_DEBATE_CONCURRENCY=${GUARD_DEBATE_CONCURRENCY:-2}
      # API anahtarları yalnızca env_file: .env (boş ${VAR} env_file'i ezmesin diye burada yok)
      - LLM_KEY_SLOTS=${LLM_KEY_SLOTS:-32}
      - LLM_PROVIDER_ORDER=${LLM_PROVIDER_ORDER:-ollama}
      - GROQ_DEBATE_MODEL=${GROQ_DEBATE_MODEL:-llama-3.3-70b-versatile}
      - GROQ_LEARN_MODEL=${GROQ_LEARN_MODEL:-llama-3.3-70b-versatile}
      - GROQ_FAST_MODELS=${GROQ_FAST_MODELS:-}
      - GROQ_MAIN_MODELS=${GROQ_MAIN_MODELS:-}
      - GROQ_LEARNING_MODELS=${GROQ_LEARNING_MODELS:-}
      - GROQ_FINAL_MODEL=${GROQ_FINAL_MODEL:-}
      - GROQ_FALLBACK_MODEL=${GROQ_FALLBACK_MODEL:-}
      - AI_ENABLE_SWARM=${AI_ENABLE_SWARM:-false}
      - AI_MINIMUM_MODEL_VOTE=${AI_MINIMUM_MODEL_VOTE:-3}
      - AI_REQUIRED_CONFIDENCE=${AI_REQUIRED_CONFIDENCE:-0.72}
      - AI_MAX_PARALLEL_REQUEST=${AI_MAX_PARALLEL_REQUEST:-12}
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - prometheus_net

  # ═══════════════════════════════════════
  # SIGNAL ENGINE
  # ═══════════════════════════════════════
  signal_engine:
    build:
      context: ./services
      dockerfile: signal_engine/Dockerfile
    container_name: prometheus_signal
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
    depends_on:
      - redis
      - feature_engine
    networks:
      - prometheus_net

  immunity_system:
    build:
      context: ./services
      dockerfile: immunity_system/Dockerfile
    container_name: prometheus_immunity
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
    networks:
      - prometheus_net

  oms:
    build:
      context: ./services
      dockerfile: oms/Dockerfile
    container_name: prometheus_oms
    restart: unless-stopped
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - DRY_RUN=${DRY_RUN:-true}
    depends_on:
      - immunity_system
      - redis
      - postgres
    networks:
      - prometheus_net

  shadow_system:
    build:
      context: ./services
      dockerfile: shadow_system/Dockerfile
    container_name: prometheus_shadow
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - SHADOW_OPEN_IDS=${SHADOW_OPEN_IDS:-SHADOW_A}
      - SHADOW_ONE_PER_SYMBOL=${SHADOW_ONE_PER_SYMBOL:-true}
    depends_on:
      - redis
      - postgres
    networks:
      - prometheus_net

  autopsy:
    build: ./services/autopsy
    container_name: prometheus_autopsy
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - qdrant
      - redis
    networks:
      - prometheus_net

  rag_memory:
    build: ./services/rag_memory
    container_name: prometheus_rag
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
    depends_on:
      - qdrant
      - postgres
    networks:
      - prometheus_net

  scenario_engine:
    build: ./services/scenario_engine
    container_name: prometheus_scenarios
    restart: unless-stopped
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
    networks:
      - prometheus_net

  # ═══════════════════════════════════════
  # MONİTORİNG
  # ═══════════════════════════════════════
  prometheus_monitor:
    image: prom/prometheus:latest
    container_name: prometheus_monitor
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prometheus_net

  grafana:
    image: grafana/grafana:latest
    container_name: prometheus_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    networks:
      - prometheus_net

  # ═══════════════════════════════════════
  # DASHBOARD
  # ═══════════════════════════════════════
  dashboard:
    build: ./services/dashboard
    container_name: prometheus_dashboard
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prometheus_trading
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-240}
      - GROQ_LEARN_MODEL=${GROQ_LEARN_MODEL:-llama-3.3-70b-versatile}
      - LLM_KEY_SLOTS=${LLM_KEY_SLOTS:-32}
      - DRY_RUN=${DRY_RUN:-true}
    depends_on:
      - redis
      - postgres
      - ollama
    networks:
      - prometheus_net

  # ═══════════════════════════════════════
  # BACKTEST — runs 1-year historical simulation
  # Fetches Binance Futures klines, computes metrics, saves to Redis
  # ═══════════════════════════════════════
  backtest:
    build: ./services/backtest
    container_name: prometheus_backtest
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BACKTEST_TOTAL_SYMBOLS=${BACKTEST_TOTAL_SYMBOLS:-500}
      - BACKTEST_CHUNK_SIZE=${BACKTEST_CHUNK_SIZE:-20}
      - BACKTEST_DAYS=${BACKTEST_DAYS:-365}
      - BACKTEST_DAYS_EXTENDED=${BACKTEST_DAYS_EXTENDED:-0}
      - BACKTEST_CHUNK_PAUSE_SEC=${BACKTEST_CHUNK_PAUSE_SEC:-3}
      - PORTFOLIO_VALUE=${PORTFOLIO_VALUE:-10000}
    depends_on:
      - redis
    networks:
      - prometheus_net

  # ═══════════════════════════════════════
  # HISTORICAL BACKFILL (one-shot, tools profile)
  # Run: docker compose run --rm backfill
  # ═══════════════════════════════════════
  backfill:
    build: ./services/backfill
    container_name: prometheus_backfill
    restart: "no"
    profiles:
      - tools
    environment:
      - DATABASE_URL=postgresql://prometheus:prometheus@postgres:5432/prometheus_trading
      - QDRANT_URL=http://qdrant:6333
      - BACKFILL_DAYS=${BACKFILL_DAYS:-30}
      - MAX_SYMBOLS=${MAX_SYMBOLS:-500}
    depends_on:
      - postgres
      - qdrant
    networks:
      - prometheus_net
